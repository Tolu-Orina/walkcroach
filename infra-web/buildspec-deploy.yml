version: 0.2

env:
  variables:
    TF_IN_AUTOMATION: "true"

phases:
  install:
    runtime-versions:
      golang: 1.21
    commands:
      - curl -fsSL https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip -o /tmp/terraform.zip
      - unzip -o /tmp/terraform.zip -d /usr/local/bin
  pre_build:
    commands:
      - |
        case "${TF_VAR_environment}" in
          dev)  export KEY="web/dev/terraform.tfstate" ;;
          test) export KEY="web/test/terraform.tfstate" ;;
          prod) export KEY="web/prod/terraform.tfstate" ;;
          *) echo "Unknown TF_VAR_environment=${TF_VAR_environment}"; exit 1 ;;
        esac
      - |
        # tfplan is in the secondary InputArtifact (TerraformPlanOutput*), not Source
        PLAN_DIR=""
        for candidate in \
          "${CODEBUILD_SRC_DIR_TerraformPlanOutputProd:-}" \
          "${CODEBUILD_SRC_DIR_TerraformPlanOutputTest:-}" \
          "${CODEBUILD_SRC_DIR_TerraformPlanOutputDev:-}"; do
          if [ -n "$candidate" ] && [ -f "${candidate}/infra-web/tfplan" ]; then
            PLAN_DIR="$candidate"
            break
          fi
        done
        if [ -z "$PLAN_DIR" ]; then
          echo "ERROR: infra-web/tfplan not found in any TerraformPlanOutput* artifact"
          env | grep '^CODEBUILD_SRC_DIR' || true
          exit 1
        fi
        cp "${PLAN_DIR}/infra-web/tfplan" "${CODEBUILD_SRC_DIR}/infra-web/tfplan"
        echo "Copied tfplan from ${PLAN_DIR}"
  build:
    commands:
      - cd infra-web
      - |
        terraform init -input=false \
          -backend-config="bucket=walkcroach-tf-state" \
          -backend-config="key=${KEY}" \
          -backend-config="region=eu-west-2" \
          -backend-config="encrypt=true" \
          -backend-config="dynamodb_table=walkcroach-tf-lock"
      - terraform apply -input=false -auto-approve tfplan
      - terraform output -json > ../terraform-web-outputs.json
artifacts:
  files:
    - terraform-web-outputs.json
    - infra-web/**/*
  name: terraform-deploy-web-${TF_VAR_environment}
