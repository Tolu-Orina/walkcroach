version: 0.2

env:
  variables:
    # Overridden by CodeBuild project env (TF_VAR_environment). Do not hardcode env here.
    ENVIRONMENT: ""

phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands:
      - |
        set -eu
        ENV="${TF_VAR_environment:-${ENVIRONMENT:-}}"
        if [ -z "$ENV" ]; then
          echo "ERROR: TF_VAR_environment (or ENVIRONMENT) must be set by the CodeBuild project"
          exit 1
        fi
        export ENVIRONMENT="$ENV"
        echo "ENVIRONMENT=${ENVIRONMENT}"

        # Prefer api_url from frontend Terraform deploy artifact (reads backend SSM at TF apply)
        API_URL=""
        for candidate in \
          "${CODEBUILD_SRC_DIR_TerraformDeployOutputProd:-}" \
          "${CODEBUILD_SRC_DIR_TerraformDeployOutputTest:-}" \
          "${CODEBUILD_SRC_DIR_TerraformDeployOutputDev:-}"; do
          if [ -n "$candidate" ] && [ -f "${candidate}/terraform-web-outputs.json" ]; then
            API_URL=$(node -e "const j=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));process.stdout.write(j.api_url?.value||'');" \
              "${candidate}/terraform-web-outputs.json")
            if [ -n "$API_URL" ]; then
              echo "API_URL from terraform-web-outputs.json"
              break
            fi
          fi
        done

        if [ -z "$API_URL" ]; then
          echo "API_URL not in deploy artifact; reading SSM /walkcroach/${ENV}/web/api_url"
          API_URL=$(aws ssm get-parameter --name "/walkcroach/${ENV}/web/api_url" --query 'Parameter.Value' --output text 2>/dev/null) || API_URL=""
        fi

        if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
          echo "ERROR: Backend API URL not found."
          echo "  SSM path: /walkcroach/${ENV}/web/api_url"
          echo "  Deploy infra-backend to ${ENV} first (module.ssm publishes the API Gateway URL)."
          echo "  Then re-run frontend Terraform deploy so terraform-web-outputs.json includes api_url."
          exit 1
        fi

        echo "VITE_API_URL=${API_URL}"
        echo "VITE_API_URL=${API_URL}" > web/.env.production

        read_ssm() {
          aws ssm get-parameter --name "$1" --query 'Parameter.Value' --output text 2>/dev/null || true
        }

        COGNITO_POOL=$(read_ssm "/walkcroach/${ENV}/web/cognito_user_pool_id")
        COGNITO_CLIENT=$(read_ssm "/walkcroach/${ENV}/web/cognito_client_id")
        COGNITO_REGION=$(read_ssm "/walkcroach/${ENV}/web/cognito_region")

        if [ -n "$COGNITO_CLIENT" ] && [ "$COGNITO_CLIENT" != "None" ]; then
          echo "VITE_COGNITO_CLIENT_ID=${COGNITO_CLIENT}" >> web/.env.production
        fi
        if [ -n "$COGNITO_REGION" ] && [ "$COGNITO_REGION" != "None" ]; then
          echo "VITE_COGNITO_REGION=${COGNITO_REGION}" >> web/.env.production
        fi
        if [ "$ENV" = "prod" ]; then
          echo "VITE_ALLOW_DEV_AUTH=false" >> web/.env.production
        else
          echo "VITE_ALLOW_DEV_AUTH=true" >> web/.env.production
        fi
        if [ -n "$COGNITO_POOL" ] && [ "$COGNITO_POOL" != "None" ]; then
          echo "Cognito pool ${COGNITO_POOL} configured for web build"
        fi

        GITHUB_SLUG=$(read_ssm "/walkcroach/${ENV}/github/app_slug")
        if [ -n "$GITHUB_SLUG" ] && [ "$GITHUB_SLUG" != "None" ]; then
          echo "VITE_GITHUB_APP_ENABLED=true" >> web/.env.production
        fi
        if [ "$ENV" = "prod" ]; then
          echo "VITE_ALLOW_GITHUB_PAT=false" >> web/.env.production
        else
          echo "VITE_ALLOW_GITHUB_PAT=true" >> web/.env.production
        fi
  build:
    commands:
      - |
        set -eu
        cd "${CODEBUILD_SRC_DIR}/web"
        # NODE_ENV=production would skip devDependencies (typescript, vite); force them in
        npm ci --include=dev
        npm run build
  post_build:
    commands:
      - |
        set -eu
        cd "${CODEBUILD_SRC_DIR}"
        ENV="${TF_VAR_environment:-${ENVIRONMENT:-}}"
        if [ ! -d web/dist ]; then
          echo "ERROR: web/dist missing — build failed; skipping deploy"
          exit 1
        fi
        WEB_BUCKET="walkcroach-web-${ENV}"
        aws s3 sync web/dist "s3://${WEB_BUCKET}/" --delete

        # Prefer distribution id from Terraform deploy artifact (no ListDistributions needed)
        DIST_ID=""
        for candidate in \
          "${CODEBUILD_SRC_DIR_TerraformDeployOutputProd:-}" \
          "${CODEBUILD_SRC_DIR_TerraformDeployOutputTest:-}" \
          "${CODEBUILD_SRC_DIR_TerraformDeployOutputDev:-}"; do
          if [ -n "$candidate" ] && [ -f "${candidate}/terraform-web-outputs.json" ]; then
            DIST_ID=$(node -e "const j=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));process.stdout.write(j.cloudfront_distribution_id?.value||'');" \
              "${candidate}/terraform-web-outputs.json")
            if [ -n "$DIST_ID" ]; then
              break
            fi
          fi
        done
        if [ -z "$DIST_ID" ]; then
          echo "WARN: cloudfront_distribution_id not found in deploy artifact; skipping invalidation"
        else
          echo "Invalidating CloudFront distribution ${DIST_ID}"
          aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*"
        fi
artifacts:
  files:
    - web/dist/**/*
  name: web-app-build
