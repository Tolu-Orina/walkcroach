version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands:
      - echo "Chrome extension unit / typecheck / build"
      - node -v
  build:
    commands:
      - |
        set -eu
        cd chrome
        # Fail closed: production zip must not ship localhost defaults
        if [ -z "${WALKCROACH_API_BASE:-}" ]; then
          echo "WALKCROACH_API_BASE is required for chrome production builds" >&2
          exit 1
        fi
        if [ -z "${WALKCROACH_PRIVACY_URL:-}" ]; then
          echo "WALKCROACH_PRIVACY_URL is required for chrome production builds" >&2
          exit 1
        fi
        export WALKCROACH_REQUIRE_PROD_ENV=true
        npm ci
        npm run typecheck
        npm run test
        npm run build
        npm run zip
artifacts:
  files:
    - chrome/.output/**/*
  name: chrome-extension-build
