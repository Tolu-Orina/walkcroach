<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!--
    Activity-bar icons are single-color masks (currentColor).
    Do not use the full-color PNG here — its dark bg becomes a solid square.
  -->
  <!-- trail (behind body) -->
  <circle cx="3.2" cy="4.2" r="0.85" fill="currentColor" />
  <circle cx="5.1" cy="6.6" r="1.05" fill="currentColor" />
  <circle cx="7" cy="9" r="1.2" fill="currentColor" />
  <path
    fill="none"
    stroke="currentColor"
    stroke-width="1.1"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="M3.6 4.8 4.8 6.2M5.6 7.4 6.5 8.5"
  />
  <!-- abdomen -->
  <ellipse cx="9.2" cy="14" rx="4.2" ry="3.1" fill="currentColor" />
  <!-- thorax / head -->
  <ellipse cx="14.2" cy="12.2" rx="2.55" ry="2.9" fill="currentColor" />
  <!-- smile cut (negative space via overlay not available — skip) -->
  <!-- legs -->
  <path
    fill="none"
    stroke="currentColor"
    stroke-width="1.25"
    stroke-linecap="round"
    d="M6.6 16.2 4.7 19.1M8.8 16.6 7.5 19.4M11 16.3 10.4 19.3M12.6 15 14.1 17.6M7.2 12.2 5.2 10.1M12.4 11.2 14.2 9.3"
  />
  <!-- antennae -->
  <path
    fill="none"
    stroke="currentColor"
    stroke-width="1.2"
    stroke-linecap="round"
    d="M15.4 10.2c1.3-1.8 2.8-2.9 4.6-3.4M15.8 11.6c1.5-.35 2.8-.05 4.1.7"
  />
  <circle cx="20.2" cy="6.6" r="1" fill="currentColor" />
  <circle cx="20.1" cy="12.5" r="0.85" fill="currentColor" />
</svg>
