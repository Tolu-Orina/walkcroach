            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub '${PipelineArtifactsBucket.Arn}/*'
                  - !GetAtt PipelineArtifactsBucket.Arn
              - Sid: WebLogBucketsTest
                Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - 'arn:aws:s3:::walkcroach-web-test'
                  - 'arn:aws:s3:::walkcroach-web-test/*'
                  - 'arn:aws:s3:::walkcroach-logs-test'
                  - 'arn:aws:s3:::walkcroach-logs-test/*'
              - Sid: TerraformStateObjectsTest
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: 'arn:aws:s3:::walkcroach-tf-state/web/test/*'
              - Sid: TerraformStateBucketList
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketVersioning
                Resource: 'arn:aws:s3:::walkcroach-tf-state'
              - Sid: TerraformStateLock
                Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/walkcroach-tf-lock'
              - Effect: Allow
                Action:
                  - cloudfront:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - route53:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - acm:*
                Resource: '*'
              - Sid: SsmParametersTest
                Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                  - ssm:AddTagsToResource
                Resource: !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/walkcroach/test/web/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'

  CodeBuildTerraformRoleProd:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-codebuild-terraform-prod-role'
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: TerraformBuildProd
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildTerraformProdPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub '${PipelineArtifactsBucket.Arn}/*'
                  - !GetAtt PipelineArtifactsBucket.Arn
              - Sid: WebLogBucketsProd
                Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - 'arn:aws:s3:::walkcroach-web-prod'
                  - 'arn:aws:s3:::walkcroach-web-prod/*'
                  - 'arn:aws:s3:::walkcroach-logs-prod'
                  - 'arn:aws:s3:::walkcroach-logs-prod/*'
              - Sid: TerraformStateObjectsProd
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: 'arn:aws:s3:::walkcroach-tf-state/web/prod/*'
              - Sid: TerraformStateBucketList
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketVersioning
                Resource: 'arn:aws:s3:::walkcroach-tf-state'
              - Sid: TerraformStateLock
                Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/walkcroach-tf-lock'
              - Effect: Allow
                Action:
                  - cloudfront:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - route53:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - acm:*
                Resource: '*'
              - Sid: SsmParametersProd
                Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                  - ssm:AddTagsToResource
                Resource: !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/walkcroach/prod/web/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'

  # ─── IAM Roles for CodeBuild - Web App Build (sync to S3 + CloudFront
  # invalidation), split per environment so WebAppBuildDev can't touch the
  # Prod S3 bucket or Prod CloudFront distribution. dynamodb:* dropped
  # entirely (dead grant — web/buildspec.yml never calls DynamoDB).
  CodeBuildWebAppRoleDev:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-codebuild-webapp-dev-role'
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: WebAppBuildDev
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildWebAppDevPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub '${PipelineArtifactsBucket.Arn}/*'
                  - !GetAtt PipelineArtifactsBucket.Arn
              - Sid: WebBucketSyncDev
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::walkcroach-web-dev'
                  - 'arn:aws:s3:::walkcroach-web-dev/*'
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                  - cloudfront:GetDistribution
                Resource: '*'
              - Sid: SsmParametersReadDev
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/walkcroach/dev/web/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'

  CodeBuildWebAppRoleTest:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-codebuild-webapp-test-role'
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
