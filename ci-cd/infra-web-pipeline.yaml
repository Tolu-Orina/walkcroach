            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub '${PipelineArtifactsBucket.Arn}/*'
                  - !GetAtt PipelineArtifactsBucket.Arn
              - Sid: WebBucketSyncTest
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::walkcroach-web-test'
                  - 'arn:aws:s3:::walkcroach-web-test/*'
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                  - cloudfront:GetDistribution
                Resource: '*'
              - Sid: SsmParametersReadTest
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/walkcroach/test/web/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'

  CodeBuildWebAppRoleProd:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-codebuild-webapp-prod-role'
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: WebAppBuildProd
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildWebAppProdPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub '${PipelineArtifactsBucket.Arn}/*'
                  - !GetAtt PipelineArtifactsBucket.Arn
              - Sid: WebBucketSyncProd
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::walkcroach-web-prod'
                  - 'arn:aws:s3:::walkcroach-web-prod/*'
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                  - cloudfront:GetDistribution
                Resource: '*'
              - Sid: SsmParametersReadProd
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/walkcroach/prod/web/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'

  # CloudWatch Log Groups
  TerraformValidateLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${AWS::StackName}-terraform-validate'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation

  TerraformPlanLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${AWS::StackName}-terraform-plan'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation

  TerraformDeployLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${AWS::StackName}-terraform-deploy'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation

  WebAppBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${AWS::StackName}-webapp-build'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation

  UnitTestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${AWS::StackName}-unit-test'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation

  IntegrationTestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${AWS::StackName}-integration-test'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation

  E2ETestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${AWS::StackName}-e2e-test'
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation

  # CodeBuild Project - Unit Tests
  UnitTestBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${AWS::StackName}-unit-test'
      Description: 'Run unit tests for web application'
      ServiceRole: !GetAtt CodeBuildUnitTestRole.Arn
