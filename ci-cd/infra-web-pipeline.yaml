AWSTemplateFormatVersion: '2010-09-09'
Description: 'WalkCroach Web Infra CI/CD Pipeline - CodePipeline with GitHub, CodeBuild for Terraform'

Parameters:
  GitHubOwner:
    Type: String
    Description: GitHub repository owner/username
    Default: 'Tolu-Orina'
  
  GitHubRepo:
    Type: String
    Description: GitHub repository name
    Default: 'walkcroach'
  
  GitHubConnectionArn:
    Type: AWS::SSM::Parameter::Value<String>
    Description: SSM parameter that holds the CodeConnections GitHub ARN
    Default: /walkcroach/cicd/codeconnections_arn

# Mappings:
#   BranchToEnvironment:
#     Note: This mapping is kept for reference/documentation purposes.
#     The actual branch-to-environment mapping is handled in BuildSpec files
#     via shell scripts that detect the branch and set TF_VAR_environment.
#     develop:
#       Environment: dev
#       DomainPrefix: dev
#     test:
#       Environment: test
#       DomainPrefix: test
#     main:
#       Environment: prod
#       DomainPrefix: ""

Resources:
  # S3 Bucket for CodePipeline artifacts
  # Note: S3 bucket names must be lowercase and globally unique
  # We don't specify BucketName to let AWS auto-generate a unique lowercase name
  PipelineArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      # AWS will auto-generate a unique lowercase bucket name
      # We'll reference it via !Ref in other resources
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: PipelineArtifacts

  # IAM Role for CodePipeline
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-pipeline-role'
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: CodePipeline
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                Resource:
                  - !Sub '${PipelineArtifactsBucket.Arn}/*'
                  - !GetAtt PipelineArtifactsBucket.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TerraformValidateBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TerraformPlanBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TerraformDeployBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TerraformValidateTestBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TerraformPlanTestBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TerraformDeployTestBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TerraformValidateProdBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TerraformPlanProdBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt TerraformDeployProdBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource:
                  - !GetAtt WebAppBuildDev.Arn
                  - !GetAtt WebAppBuildTest.Arn
                  - !GetAtt WebAppBuildProd.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt UnitTestBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt IntegrationTestBuild.Arn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt E2ETestBuild.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn

  # IAM Role for CodeBuild - unit tests only (web/buildspec-test.yml makes no
  # AWS API calls at all — needs no permissions beyond the shared artifact
  # bucket and CloudWatch Logs).
  CodeBuildUnitTestRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-codebuild-unit-test-role'
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: UnitTestBuild
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildUnitTestPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub '${PipelineArtifactsBucket.Arn}/*'
                  - !GetAtt PipelineArtifactsBucket.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'

  # IAM Role shared by Integration/E2E test runners. Both buildspecs
  # (web/buildspec-integration.yml, web/buildspec-e2e.yml) only ever read
  # SSM parameters under /walkcroach/test/web/* — they always exercise the
  # already-deployed Test environment as a stable target, regardless of
  # which branch triggered the pipeline.
  CodeBuildTestRunnerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-codebuild-test-runner-role'
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: IntegrationE2ETestBuild
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildTestRunnerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub '${PipelineArtifactsBucket.Arn}/*'
                  - !GetAtt PipelineArtifactsBucket.Arn
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/walkcroach/test/web/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'

  # ─── IAM Roles for CodeBuild - Terraform Operations, split per environment ──
  # infra-web's Terraform config (main.tf + modules/{s3,cloudfront,dns,acm})
  # never creates DynamoDB/Lambda/Cognito/API GW/KMS/IAM resources — those
  # broad grants from the backend template are omitted. Remaining grants
  # (S3, CloudFront, Route53, ACM, SSM) are split per env. DynamoDB is
  # limited to the shared Terraform state lock table only. CloudFront/
  # Route53/ACM stay on Resource: '*' because those services use opaque
  # AWS-generated IDs (no name-based ARN for Create*).
  CodeBuildTerraformRoleDev:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-codebuild-terraform-dev-role'
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: TerraformBuildDev
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildTerraformDevPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub '${PipelineArtifactsBucket.Arn}/*'
                  - !GetAtt PipelineArtifactsBucket.Arn
              - Sid: WebLogBucketsDev
                Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - 'arn:aws:s3:::walkcroach-web-dev'
                  - 'arn:aws:s3:::walkcroach-web-dev/*'
                  - 'arn:aws:s3:::walkcroach-logs-dev'
                  - 'arn:aws:s3:::walkcroach-logs-dev/*'
              - Sid: TerraformStateObjectsDev
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: 'arn:aws:s3:::walkcroach-tf-state/web/dev/*'
              - Sid: TerraformStateBucketList
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketVersioning
                Resource: 'arn:aws:s3:::walkcroach-tf-state'
              - Sid: TerraformStateLock
                Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/walkcroach-tf-lock'
              - Effect: Allow
                Action:
                  - cloudfront:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - route53:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - acm:*
                Resource: '*'
              - Sid: SsmParametersDev
                Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:GetParameter
                  - ssm:AddTagsToResource
                Resource: !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/walkcroach/dev/web/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'

  CodeBuildTerraformRoleTest:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-codebuild-terraform-test-role'
      Tags:
        - Key: Project
          Value: WalkCroach
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: TerraformBuildTest
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
